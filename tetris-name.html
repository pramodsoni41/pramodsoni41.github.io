<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris Name Reveal</title>
<style>
  :root{ --bg:#101418; --panel:#161c22; --line:#232c35; --ink:#e8eef2; --dim:#7b8894; --accent:#ffd23f; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow:hidden;background:var(--bg);}
  body{ background:var(--bg); color:var(--ink); font-family:"Courier New",ui-monospace,monospace;
    min-height:100vh; box-sizing:border-box; display:flex; flex-direction:column; align-items:center; padding:20px 16px 20px; }
  h1{font-size:15px;letter-spacing:.45em;text-transform:uppercase;color:var(--dim);font-weight:400;margin-bottom:18px;text-align:center}
  h1 b{color:var(--accent);font-weight:700}
  .controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
  input[type=text]{ background:var(--panel);border:1px solid var(--line);color:var(--ink);
    font-family:inherit;font-size:16px;letter-spacing:.2em;text-transform:uppercase; padding:10px 14px;width:220px;outline:none; }
  input[type=text]:focus{border-color:var(--accent)}
  button{ background:var(--accent);color:#1a1a1a;border:none;cursor:pointer;
    font-family:inherit;font-weight:700;font-size:14px;letter-spacing:.15em; text-transform:uppercase;padding:10px 20px; }
  button:hover{filter:brightness(1.08)}
  button:active{transform:translateY(1px)}
  select{background:var(--panel);border:1px solid var(--line);color:var(--ink);font-family:inherit;font-size:14px;padding:10px;outline:none;cursor:pointer}
  .hud{ display:flex;gap:24px;justify-content:center;margin-bottom:10px;
    font-size:12px;letter-spacing:.25em;text-transform:uppercase;color:var(--dim); }
  .hud b{color:var(--accent);font-weight:700}
  .stage{ position:relative; background:linear-gradient(#0c1014,#0e1319); }
  canvas{display:block}
  .stage::after{ content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 1px,transparent 1px 3px); }
  .hint{margin-top:16px;font-size:12px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;text-align:center}
</style>
</head>
<body>
  <h1>■ Block <b>Drop</b> — the gaps spell the name</h1>
  <div class="controls">
    <input id="nameInput" type="text" maxlength="10" value="CLAUDE" aria-label="Name to reveal">
    <select id="speedSel" aria-label="Speed">
      <option value="0.5" selected>Speed ×0.5</option>
      <option value="1">Speed ×1</option>
      <option value="2">Speed ×2</option>
      <option value="4">Speed ×4</option>
    </select>
    <button id="dropBtn">Drop blocks</button>
  </div>
  <div class="hud">
    <span>Lines <b id="hudLines">0</b></span>
    <span>Score <b id="hudScore">0</b></span>
  </div>
  <div class="stage"><canvas id="cv"></canvas></div>
  <div class="hint">Type a name (A–Z, 0–9) and press Drop · every piece drops from the top and lands on real support</div>

    let bi=-1, best=-1;
    for(let b=0;b<bandPieces.length;b++){
      if(ptr[b] >= bandPieces[b].length) continue;
      const row = bandPieces[b][ptr[b]].maxRow + Math.random()*0.6;
      if(row > best){ best=row; bi=b; }
    }
    if(bi<0) break;
    order.push(bandPieces[bi][ptr[bi]++]);
  }
  return { grid:{rows, cols, filled, letterCells}, order };
}

/* ---------- Rendering: one piece at a time, slides in, ghost preview, hard drop ---------- */
const canvas = document.getElementById("cv");
const ctx = canvas.getContext("2d");
const dpr = Math.min(window.devicePixelRatio||1, 2);
const hudLines  = document.getElementById("hudLines");
const hudScore  = document.getElementById("hudScore");

let grid=null, order=[], cell=24, t0=0, running=false, doneAt=null, speed=2;
let OX=0, OY=0;                            // pixel offset: OX centres horizontally, OY = wall row-0 y
let lineFlash = {}, completedLines = 0;   // rows fully covered -> flash time; score source
const ROWS_PER_SEC = 26;
const DROP_MULT = 3;   // once lined up & rotated, the drop is a fast hard-drop
let SKY = 10;          // empty rows of "sky" above the wall (set per name for a 9:16 frame)
let HOVER_ROW = 1 - SKY;   // grid row where a piece hovers (up in the sky) before dropping
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ---------- Sound: tiny synth via Web Audio (no files, self-contained).
   Unlocked on the first user gesture so browsers allow playback. ---------- */
let audioCtx = null, audioReady = false;
function unlockAudio(){
  audioReady = true;
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ audioCtx=null; } }
  if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
function tone(opts){
  if(!audioReady || !audioCtx) return;
  const { freq=440, to=null, type="square", dur=0.06, gain=0.12, delay=0 } = opts;
  const t = audioCtx.currentTime + delay;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  if(to) o.frequency.exponentialRampToValueAtTime(Math.max(1,to), t + dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(gain, t + 0.006);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
function noiseThud(gain){
  if(!audioReady || !audioCtx) return;
  const dur = 0.09, t = audioCtx.currentTime;
  const n = audioCtx.createBufferSource();
  const buf = audioCtx.createBuffer(1, (audioCtx.sampleRate*dur)|0, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  n.buffer = buf;
  const lp = audioCtx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=380;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(gain, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  n.connect(lp).connect(g).connect(audioCtx.destination);
  n.start(t); n.stop(t + dur);
}
const playFlip   = ()=> tone({ freq:640, to:820, type:"square",   dur:0.045, gain:0.10 }); // quick click
const playFall   = ()=> tone({ freq:300, to:150, type:"triangle", dur:0.11,  gain:0.06 }); // soft downward whoosh
const playSettle = ()=>{ tone({ freq:150, to:70, type:"sine", dur:0.10, gain:0.14 }); noiseThud(0.10); }; // low thunk
const playLine   = ()=>{ tone({ freq:660, type:"square", dur:0.09, gain:0.10 });                          // bright two-note chime
                         tone({ freq:990, type:"square", dur:0.12, gain:0.10, delay:0.09 }); };

function sizeCanvas(){
  const totalRows = grid.rows + SKY;
  // portrait 9:16 stage (reel format). Reserve room for the header/controls/hint
  // so the whole page fits its container -> no overflow, no scrollbars.
  const availW = Math.min(document.body.clientWidth - 34, 520);
  const availH = Math.max(300, window.innerHeight - 230);
  let Wc = Math.min(availW, availH * 9/16);
  let Hc = Wc * 16/9;
  if(Hc > availH){ Hc = availH; Wc = Hc * 9/16; }
  // fit the playfield (cols x totalRows) inside the frame, centred
  cell = Math.max(6, Math.floor(Math.min(Wc/grid.cols, Hc/totalRows) * 0.98));
  const gridW = grid.cols*cell, gridH = totalRows*cell;
  OX = Math.round((Wc - gridW)/2);
  OY = Math.round((Hc - gridH)/2) + SKY*cell;      // y of wall row 0 (sky sits above)
  canvas.width  = Math.round(Wc*dpr);
  canvas.height = Math.round(Hc*dpr);
  canvas.style.width  = Wc + "px";
  canvas.style.height = Hc + "px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

/* A piece is worth rotating only if a 90 turn actually changes its shape.
   O-squares and single blocks map onto themselves, so rotating them is
   meaningless - those never rotate. */
function isRotSym(cells){
  let minR=Infinity,maxR=-Infinity,minC=Infinity,maxC=-Infinity;
  for(const [r,c] of cells){ if(r<minR)minR=r; if(r>maxR)maxR=r; if(c<minC)minC=c; if(c>maxC)maxC=c; }
  if((maxR-minR) !== (maxC-minC)) return false;        // non-square bbox can't be 90-symmetric
  const set = new Set(cells.map(([r,c])=>r+","+c));
  const CX = minC+maxC+1, CY = minR+maxR+1;            // 2x the piece centre
  for(const [r,c] of cells){
    const rx = (2*c+1)-CX, ry = (2*r+1)-CY;
    const nX = -ry+CX, nY = rx+CY;                      // rotate cell centre 90 deg
    const nc = (nX-1)/2, nr = (nY-1)/2;
    if(!Number.isInteger(nc) || !Number.isInteger(nr) || !set.has(nr+","+nc)) return false;
  }
  return true;
}

function scheduleAnim(){
  const v = ROWS_PER_SEC * speed / 1000;
  let t = 350;
  for(const p of order){
    const h = p.maxRow - p.minRow + 1;
    // pieces fall straight down in their own columns (no drift) for realism.
    // only some pieces rotate, and mostly by a single quarter-turn; but pieces
    // that look identical after a 90 turn (squares, singles) never rotate
    const rr = Math.random();
    p.turns   = isRotSym(p.cells) ? 0 : (rr < 0.6 ? 0 : (rr < 0.88 ? 1 : 2));
    p.turnDir = Math.random() < 0.5 ? -1 : 1;
    // quick rotation, but with a clear gap between turns: the flip itself is
    // snappy (fast relative to the fall), then it waits before the next press.
    p.turnMs = 90  / speed;                 // fast, snappy quarter-turn
    p.holdMs = 300 / speed;                 // gap between/after presses
    p.leadMs = 110 / speed;                 // beat before the first press
    p.rotDur = p.turns > 0 ? (p.leadMs + p.turns*(p.turnMs + p.holdMs)) : 0;
    // every piece spawns at the top-centre and slides left/right to its column
    p.moveOff = (grid.cols/2) - (p.minCol + p.maxCol + 1)/2;   // columns from centre
    p.moveDur = Math.min(80 + 26*Math.abs(p.moveOff), 380) / speed;
    p.hangDur = p.moveDur + p.rotDur;       // top phase: slide across, then rotate
    p.fallDur = (p.minRow - HOVER_ROW) / (v * DROP_MULT);  // hard-drop from the sky to its rest
    p.start = t;
    p.landAt = undefined;
    p.playedFall = false;
    p.turnsPlayed = 0;
    t += p.hangDur + p.fallDur + 70/speed;
  }
  return t;
}

const easeOut   = x => 1 - Math.pow(1-x, 3);
const easeInOut = x => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2, 3)/2;

function drawBlock(x, y, color, flash){
  const s = cell, b = Math.max(2, s*0.14);
  ctx.fillStyle = color; ctx.fillRect(x, y, s, s);
  ctx.fillStyle = "rgba(255,255,255,.35)"; ctx.fillRect(x, y, s, b); ctx.fillRect(x, y, b, s);
  ctx.fillStyle = "rgba(0,0,0,.35)"; ctx.fillRect(x, y+s-b, s, b); ctx.fillRect(x+s-b, y, b, s);
  ctx.fillStyle = "rgba(0,0,0,.12)"; ctx.fillRect(x+b, y+b, s-2*b, s-2*b);
  if(flash>0){ ctx.fillStyle = "rgba(255,255,255,"+(0.6*flash)+")"; ctx.fillRect(x, y, s, s); }
}

function drawFrame(now){
  requestAnimationFrame(drawFrame);
  if(!grid) return;
  const t = running ? (now - t0) : Infinity;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const totalRows = grid.rows + SKY;
  const OYtop = OY - SKY*cell;                     // top of the playfield (sky included)
  const pfW = grid.cols*cell, pfH = totalRows*cell;
  ctx.fillStyle = "rgba(255,255,255,.02)";
  ctx.fillRect(OX, OYtop, pfW, pfH);              // faint playfield backing
  ctx.strokeStyle = "rgba(255,255,255,.04)"; ctx.lineWidth = 1; ctx.beginPath();
  for(let c=1;c<grid.cols;c++){ctx.moveTo(OX+c*cell, OYtop); ctx.lineTo(OX+c*cell, OYtop+pfH);}
  for(let r=1;r<totalRows;r++){ctx.moveTo(OX, OYtop+r*cell); ctx.lineTo(OX+pfW, OYtop+r*cell);}
  ctx.stroke();

  const v = ROWS_PER_SEC * speed / 1000;
  let landedCount = 0, allLanded = true;
  const rowHave = new Array(grid.rows).fill(0);   // landed cells per row this frame

  for(const p of order){
    if(t < p.start){ allLanded = false; continue; }
    const local = t - p.start;
    const h = p.maxRow - p.minRow + 1;
    if(local >= p.hangDur + p.fallDur){
      landedCount++;
      if(p.landAt === undefined){ p.landAt = now; playSettle(); }
      const flash = Math.max(0, 1-(now-p.landAt)/150);
      for(const [r,c] of p.cells){ const isBdr=c===0||c===grid.cols-1||r===grid.rows-1; drawBlock(OX + c*cell, OY + r*cell, isBdr?'#0c1014':p.color, flash); rowHave[r]++; }
    }else{
      allLanded = false;
      // vertical: hover up in the SKY through move + rotate, then hard-drop down
      let D;
      if(local < p.hangDur) D = HOVER_ROW;                                              // up in the sky
      else D = Math.min(p.minRow, HOVER_ROW + (local - p.hangDur) * v * DROP_MULT);      // fast drop in
      const dy = (D - p.minRow) * cell;
      // horizontal: spawn centred, then slide left/right to the target column
      let xOff = 0;
      if(local < p.moveDur) xOff = p.moveOff * (1 - easeInOut(local / p.moveDur));
      const dx = xOff * cell;
      // fire the fall sound once, the moment the piece leaves the top and drops
      if(local >= p.hangDur && !p.playedFall){ p.playedFall = true; if(p.fallDur > 30) playFall(); }
      // rotation happens AFTER arriving at the column: hold the spawn orientation
      // while sliding, then snap upright in place
      let angle = 0;
      if(p.turns > 0){
        if(local < p.moveDur){
          angle = p.turns * (Math.PI/2) * p.turnDir;                     // spawn orientation, sliding
        } else if(local < p.hangDur){
          const rl = local - p.moveDur;                                  // time within rotate phase
          let remaining = p.turns, started = 0;
          for(let k=0;k<p.turns;k++){
            const sStart = p.leadMs + k*(p.turnMs + p.holdMs);
            if(rl >= sStart) started++;
            if(rl >= sStart + p.turnMs){ remaining = p.turns-(k+1); }     // this turn done
            else if(rl >= sStart){                                        // mid-turn
              remaining = (p.turns - k) - easeInOut((rl - sStart)/p.turnMs);
              break;
            } else break;                                                 // waiting to press
          }
          while(p.turnsPlayed < started){ p.turnsPlayed++; playFlip(); }  // one click per press
          angle = remaining * (Math.PI/2) * p.turnDir;
        }
      }
      const cx = ((p.minCol + p.maxCol + 1)/2)*cell + dx + OX;
      const cy = ((p.minRow + p.maxRow + 1)/2)*cell + dy + OY;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);
      for(const [r,c] of p.cells){
        const relX = (c + 0.5 - (p.minCol + p.maxCol + 1)/2)*cell;
        const relY = (r + 0.5 - (p.minRow + p.maxRow + 1)/2)*cell;
        drawBlock(relX - cell/2, relY - cell/2, p.color, 0);
      }
      ctx.restore();
    }
  }

  // a row fully covered by blocks is a completed line (only gap-free rows can
  // reach this); flash it like a Tetris line clear and award points for it
  for(let r=0;r<grid.rows;r++){
    if(rowHave[r] === grid.cols && lineFlash[r] === undefined){
      lineFlash[r] = now; completedLines++; playLine();
    }
  }
  for(const rk in lineFlash){
    const r = +rk, age = now - lineFlash[rk];
    const burst = Math.max(0, 1 - age/500);             // white flash at the moment of completion
    for(let c=0;c<grid.cols;c++)                         // whole line becomes a clean uniform gray
      drawBlock(OX + c*cell, OY + r*cell, "#9aa1ac", 0);
    if(burst > 0){
      ctx.fillStyle = "rgba(255,255,255,"+(0.5*burst)+")";
      ctx.fillRect(OX, OY + r*cell, grid.cols*cell, cell);
    }
  }

  hudLines.textContent  = completedLines;
  hudScore.textContent  = completedLines * 100;         // points only for completed lines

  if(allLanded && order.length){
    if(doneAt===null) doneAt = now;
    const pulse = 0.5 + 0.5*Math.sin((now-doneAt)/450);
    ctx.save();
    ctx.shadowColor = "#ffd23f"; ctx.shadowBlur = 6 + 10*pulse;
    ctx.fillStyle = "rgba(255,210,63,"+(0.10+0.14*pulse)+")";
    for(const [r,c] of grid.letterCells) ctx.fillRect(OX + c*cell+1, OY + r*cell+1, cell-2, cell-2);
    ctx.restore();
  }
}

function start(name){
  speed = parseFloat(document.getElementById("speedSel").value);
  const plan = buildPlan(name || "CLAUDE");
  grid = plan.grid; order = plan.order;
  // choose sky height so wall+sky sits in a 9:16 portrait frame (min 8 rows of sky)
  SKY = Math.max(8, Math.round(grid.cols * 16/9) - grid.rows);
  HOVER_ROW = 1 - SKY;
  sizeCanvas(); scheduleAnim(); doneAt = null;
  lineFlash = {}; completedLines = 0;
  if(reduceMotion) order.forEach(p=>{ p.start = -1e9; p.hangDur = 0; p.fallDur = 0; });
  t0 = performance.now(); running = true;
}

document.getElementById("dropBtn").addEventListener("click",()=>{ unlockAudio(); start(document.getElementById("nameInput").value.trim()); });
document.getElementById("nameInput").addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ unlockAudio(); start(e.target.value.trim()); } });
window.addEventListener("resize",()=>{ if(grid) sizeCanvas(); });

start("CLAUDE");
requestAnimationFrame(drawFrame);
</script>
</body>
</html>
