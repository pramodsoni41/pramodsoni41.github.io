<script src="config.js"></script>

<script>
function fetchJSONP(url, callbackName = "jsonpCallback") {
  return new Promise((resolve, reject) => {
    const script = document.createElement("script");

    window[callbackName] = function (data) {
      resolve(data);
      document.body.removeChild(script);
      delete window[callbackName];
    };

    script.src = `${url}&callback=${callbackName}`;

    script.onerror = function () {
      reject(new Error("JSONP request failed"));
    };

    document.body.appendChild(script);
  });
}

function groupByCategory(data) {
  return data.reduce((acc, item) => {
    if (!acc[item.category]) {
      acc[item.category] = [];
    }
    acc[item.category].push(item);
    return acc;
  }, {});
}

function getSectionTitle(category) {
  const titles = {
    "PhD": "Ph.D. Ongoing",
    "MTech": "M.Tech Students",
    "BTech": "B.Tech Students",
    "External": "External Thesis"
  };

  return titles[category] || category;
}

function renderStudentItem(item) {
  return `
    <li style="margin-bottom: 18px;">
      <strong>${item.name}</strong>
      ${
        item.roll || item.duration
          ? `<span style="color: var(--muted);">
              ${
                item.roll ? `(${item.roll})` : ""
              }
              ${
                item.duration ? ` (${item.duration})` : ""
              }
            </span>`
          : ""
      }

      ${
        item.topic
          ? `<br><small>${item.topic}</small>`
          : ""
      }

      ${
        item.notes
          ? `<br><small><strong>Notes:</strong> ${item.notes}</small>`
          : ""
      }

      ${
        item.institute
          ? `<br><small><strong>Institute:</strong> ${item.institute}</small>`
          : ""
      }
    </li>
  `;
}

async function loadStudents() {
  const container = document.getElementById("studentsContainer");

  try {
    const url = CONFIG.SCRIPT_URL + "?action=getStudents";
    const response = await fetchJSONP(url);

    if (response.status !== "success") {
      container.innerHTML = "<p>Failed to load student data.</p>";
      return;
    }

    const grouped = groupByCategory(response.data);

    const displayOrder = [
      "PhD",
      "MTech",
      "BTech",
      "External"
    ];

    let html = "";

    displayOrder.forEach(category => {
      if (!grouped[category] || grouped[category].length === 0) return;

      html += `
        <section class="card">
          <h2>${getSectionTitle(category)}</h2>
          <ul>
      `;

      grouped[category].forEach(item => {
        html += renderStudentItem(item);
      });

      html += `
          </ul>
        </section>
      `;
    });

    container.innerHTML = html;

  } catch (error) {
    console.error(error);
    container.innerHTML = "<p>Error loading students content.</p>";
  }
}

document.addEventListener("DOMContentLoaded", loadStudents);
</script>

</body>
