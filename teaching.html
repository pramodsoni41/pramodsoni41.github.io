<script src="config.js"></script>

<script>
function fetchJSONP(url, callbackName = "jsonpCallback") {
  return new Promise((resolve, reject) => {
    const script = document.createElement("script");

    window[callbackName] = function (data) {
      resolve(data);
      document.body.removeChild(script);
      delete window[callbackName];
    };

    script.src = `${url}&callback=${callbackName}`;

    script.onerror = function () {
      reject(new Error("JSONP request failed"));
    };

    document.body.appendChild(script);
  });
}

function groupByCategory(data) {
  return data.reduce((acc, item) => {
    if (!acc[item.category]) {
      acc[item.category] = [];
    }
    acc[item.category].push(item);
    return acc;
  }, {});
}

function getSectionTitle(category) {
  const titles = {
    "Courses": "Courses Taught"
  };

  return titles[category] || category;
}

function renderTeachingItem(item) {
  return `
    <li style="margin-bottom: 15px;">
      <strong>${item.title}</strong>
      ${item.code ? ` – ${item.code}` : ""}
      ${item.description ? `<br><small>${item.description}</small>` : ""}
      ${item.notes ? `<br><small><strong>Notes:</strong> ${item.notes}</small>` : ""}
      ${item.year ? `<br><small><strong>Year:</strong> ${item.year}</small>` : ""}
      ${item.institute ? `<br><small><strong>Institute:</strong> ${item.institute}</small>` : ""}
    </li>
  `;
}

async function loadTeaching() {
  const container = document.getElementById("teachingContainer");

  try {
    const url = CONFIG.SCRIPT_URL + "?action=getTeaching";
    const response = await fetchJSONP(url);

    if (response.status !== "success") {
      container.innerHTML = "<p>Failed to load teaching content.</p>";
      return;
    }

    const grouped = groupByCategory(response.data);
    const displayOrder = ["Courses"];

    let html = "";

    displayOrder.forEach(category => {
      if (!grouped[category] || grouped[category].length === 0) return;

      html += `
        <section class="card">
          <h2>${getSectionTitle(category)}</h2>
          <ul>
      `;

      grouped[category].forEach(item => {
        html += renderTeachingItem(item);
      });

      html += `
          </ul>
        </section>
      `;
    });

    container.innerHTML = html;

  } catch (error) {
    console.error(error);
    container.innerHTML = "<p>Error loading teaching content.</p>";
  }
}

document.addEventListener("DOMContentLoaded", loadTeaching);
</script>

</body>
