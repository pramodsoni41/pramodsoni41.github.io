<!-- ================= SCRIPT ================= -->

<script>
function fetchJSONP(url, callbackName = "jsonpCallback") {
  return new Promise((resolve, reject) => {
    const script = document.createElement("script");

    window[callbackName] = function (data) {
      resolve(data);
      document.body.removeChild(script);
      delete window[callbackName];
    };

    script.src = `${url}&callback=${callbackName}`;

    script.onerror = function () {
      reject(new Error("JSONP request failed"));
    };

    document.body.appendChild(script);
  });
}


function groupByCategory(data) {
  return data.reduce((acc, item) => {
    if (!acc[item.category]) {
      acc[item.category] = [];
    }
    acc[item.category].push(item);
    return acc;
  }, {});
}


function getSectionTitle(category) {
  const titles = {
    "Research": "Research Projects",
    "Consultancy": "Consultancy Projects"
  };

  return titles[category] || category;
}


function renderProject(item) {
  return `
    <div class="item" style="margin-bottom: 25px;">
      <h3>${item.title}</h3>

      ${
        item.funding
          ? `<p><strong>Funding Agency:</strong> ${item.funding}</p>`
          : ""
      }

      ${
        item.value
          ? `<p><strong>Project Value:</strong> ${item.value}</p>`
          : ""
      }

      ${
        item.description
          ? `<p>${item.description}</p>`
          : ""
      }
    </div>
  `;
}


async function loadProjects() {
  const container = document.getElementById("projectsContainer");

  try {
    const url =
      CONFIG.SCRIPT_URL + "?action=getProjects";

    const response = await fetchJSONP(url);

    if (response.status !== "success") {
      container.innerHTML =
        "<p>Failed to load projects.</p>";
      return;
    }

    const grouped = groupByCategory(response.data);

    const displayOrder = [
      "Research",
      "Consultancy"
    ];

    let html = "";

    displayOrder.forEach(category => {
      if (!grouped[category] || grouped[category].length === 0) return;

      html += `
        <section class="card">
          <h2>${getSectionTitle(category)}</h2>
      `;

      grouped[category].forEach(item => {
        html += renderProject(item);
      });

      html += `
        </section>
      `;
    });

    container.innerHTML = html;

  } catch (error) {
    console.error(error);
    container.innerHTML =
      "<p>Error loading content.</p>";
  }
}


document.addEventListener(
  "DOMContentLoaded",
  loadProjects
);
</script>

</body>
