<!-- ================= SCRIPT ================= -->

<script>
function fetchJSONP(url, callbackName = "jsonpCallback") {
  return new Promise((resolve, reject) => {
    const script = document.createElement("script");

    window[callbackName] = function (data) {
      resolve(data);
      document.body.removeChild(script);
      delete window[callbackName];
    };

    script.src = `${url}&callback=${callbackName}`;

    script.onerror = function () {
      reject(new Error("JSONP request failed"));
    };

    document.body.appendChild(script);
  });
}


function groupByCategory(data) {
  return data.reduce((acc, item) => {
    if (!acc[item.category]) {
      acc[item.category] = [];
    }
    acc[item.category].push(item);
    return acc;
  }, {});
}


function getSectionTitle(category) {
  const titles = {
    "Media": "New Media & Digital Outreach",
    "Membership": "Professional Memberships",
    "Skill": "Skills",
    "Lecture": "Expert Lectures / Talks",
    "STP": "Short Term Programmes / STP",
    "Award": "Awards & Achievements"
  };

  return titles[category] || category;
}


function renderItem(item, category) {
  if (category === "Award") {
    return `
      <li style="margin-bottom: 15px;">
        <strong>${item.year || ""}</strong>
        ${item.year ? " – " : ""}
        ${item.title}
        ${item.description ? `<br><small>${item.description}</small>` : ""}
      </li>
    `;
  }

  if (category === "Media") {
    return `
      <li style="margin-bottom: 15px;">
        ${
          item.link
            ? `<a href="${item.link}" target="_blank" rel="noreferrer">
                 <strong>${item.title}</strong>
               </a>`
            : `<strong>${item.title}</strong>`
        }
        ${item.description ? `<br><small>${item.description}</small>` : ""}
      </li>
    `;
  }

  return `
    <li style="margin-bottom: 15px;">
      <strong>${item.title}</strong>
      ${item.description ? `<br><small>${item.description}</small>` : ""}
      ${item.year ? `<br><small>${item.year}</small>` : ""}
    </li>
  `;
}


async function loadOtherActivities() {
  const container = document.getElementById("otherActivitiesContainer");

  try {
    const url =
      CONFIG.SCRIPT_URL + "?action=getOtherActivities";

    const response = await fetchJSONP(url);

    if (response.status !== "success") {
      container.innerHTML =
        "<p>Failed to load Other Activities.</p>";
      return;
    }

    const grouped = groupByCategory(response.data);

    const displayOrder = [
      "Media",
      "Membership",
      "Skill",
      "Lecture",
      "STP",
      "Award"
    ];

    let html = "";

    displayOrder.forEach(category => {
      if (!grouped[category] || grouped[category].length === 0) return;

      html += `
        <section class="card">
          <h2>${getSectionTitle(category)}</h2>
          <ul>
      `;

      grouped[category].forEach(item => {
        html += renderItem(item, category);
      });

      html += `
          </ul>
        </section>
      `;
    });

    container.innerHTML = html;

  } catch (error) {
    console.error(error);
    container.innerHTML =
      "<p>Error loading content.</p>";
  }
}


document.addEventListener(
  "DOMContentLoaded",
  loadOtherActivities
);
</script>
