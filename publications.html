<html lang="en">
<head>
  <meta charset="utf-8"/>

  <title>Publications | Dr. Pramod Soni</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const links = document.querySelectorAll(".nav-links a");
  const current = window.location.pathname.split("/").pop();

  links.forEach(link => {
    const href = link.getAttribute("href");
    if (href === current || (current === "" && href === "index.html")) {
      link.classList.add("active");
    }
  });
});
</script>

<body>

<nav class="navbar">
  <div class="wrap nav-inner">
    <a href="index.html" class="nav-brand">Dr. Pramod Soni</a>

    <div class="nav-links">
      <a href="index.html" class="home-btn">Home</a>
      <a href="Other_Activities.html">Other Activities</a>
      <a href="publications.html" class="active">Publications</a>
      <a href="projects.html">Projects</a>
      <a href="teaching.html">Teaching</a>
      <a href="students.html">Students</a>
      <a href="administration.html">Administration</a>
      <a href="Important_Links.html">Important Links</a>
    </div>
  </div>
</nav>

<main class="wrap">

  <section class="card">
    <h1>Publications</h1>
    <p>
      Journal Articles, Conference Papers, and Book Chapters
      dynamically fetched from Google Sheet.
    </p>
  </section>

  <!-- Dynamic Content -->
  <div id="publicationsContainer"></div>

</main>

<footer class="wrap footer">
  <small>© Dr. Pramod Soni</small>
</footer>

<!-- config.js MUST load first -->
<script src="config.js"></script>

<script>
function fetchJSONP(url, callbackName = "jsonpCallback") {
  return new Promise((resolve, reject) => {
    const script = document.createElement("script");

    window[callbackName] = function (data) {
      resolve(data);
      document.body.removeChild(script);
      delete window[callbackName];
    };

    script.src = `${url}&callback=${callbackName}`;

    script.onerror = function () {
      reject(new Error("JSONP request failed"));
    };

    document.body.appendChild(script);
  });
}

function groupByType(data) {
  return data.reduce((acc, item) => {
    if (!acc[item.type]) {
      acc[item.type] = [];
    }
    acc[item.type].push(item);
    return acc;
  }, {});
}

function formatPublication(item) {
  let text = `
    ${item.authors} (${item.year}).
    ${item.title}.
    <em>${item.source}</em>
  `;

  if (item.volume) {
    text += `, ${item.volume}`;
  }

  if (item.pages) {
    text += `, ${item.pages}`;
  }

  if (item.doi) {
    text += `. DOI: ${item.doi}`;
  }

  if (item.status) {
    text += ` (${item.status})`;
  }

  return text;
}

async function loadPublications() {
  const container = document.getElementById("publicationsContainer");

  try {
    const url =
      CONFIG.SCRIPT_URL + "?action=getPublications";

    const response = await fetchJSONP(url);

    if (response.status !== "success") {
      container.innerHTML =
        "<p>Failed to load publications.</p>";
      return;
    }

    const grouped = groupByType(response.data);

    const sectionTitles = {
      "Journal": "Journal Articles",
      "Conference": "Conference Papers",
      "Book Chapter": "Book Chapters"
    };

    let html = "";

    for (const type in sectionTitles) {
      if (!grouped[type] || grouped[type].length === 0) continue;

      html += `
        <section class="card publications">
          <h2>${sectionTitles[type]}</h2>
          <ol>
      `;

      grouped[type].forEach(item => {
        html += `
          <li style="margin-bottom: 15px;">
            ${formatPublication(item)}
          </li>
        `;
      });

      html += `
          </ol>
        </section>
      `;
    }

    container.innerHTML = html;

  } catch (error) {
    console.error(error);
    container.innerHTML =
      "<p>Error loading publications.</p>";
  }
}

document.addEventListener(
  "DOMContentLoaded",
  loadPublications
);
</script>

</body>
</html>
