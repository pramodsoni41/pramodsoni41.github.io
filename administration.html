<script src="config.js"></script>

<script>
function fetchJSONP(url, callbackName = "jsonpCallback") {
  return new Promise((resolve, reject) => {
    const script = document.createElement("script");

    window[callbackName] = function (data) {
      resolve(data);
      document.body.removeChild(script);
      delete window[callbackName];
    };

    script.src = `${url}&callback=${callbackName}`;

    script.onerror = function () {
      reject(new Error("JSONP request failed"));
    };

    document.body.appendChild(script);
  });
}

function groupByInstitute(data) {
  return data.reduce((acc, item) => {
    if (!acc[item.institute]) {
      acc[item.institute] = [];
    }
    acc[item.institute].push(item);
    return acc;
  }, {});
}

function renderAdministrationItem(item) {
  return `
    <li style="margin-bottom: 14px;">
      <strong>${item.role}</strong>
      ${item.duration ? ` (${item.duration})` : ""}
      ${item.description ? `<br><small>${item.description}</small>` : ""}
    </li>
  `;
}

async function loadAdministration() {
  const container = document.getElementById("administrationContainer");

  try {
    const url = CONFIG.SCRIPT_URL + "?action=getAdministration";
    const response = await fetchJSONP(url);

    if (response.status !== "success") {
      container.innerHTML = "<p>Failed to load administration content.</p>";
      return;
    }

    const grouped = groupByInstitute(response.data);

    const displayOrder = [
      "IIT (BHU) Varanasi",
      "NIT Jamshedpur",
      "MNNIT Allahabad",
      "IIT Kanpur"
    ];

    let html = "";

    displayOrder.forEach(institute => {
      if (!grouped[institute] || grouped[institute].length === 0) return;

      html += `
        <section class="card">
          <h2>${institute}</h2>
          <ul>
      `;

      grouped[institute].forEach(item => {
        html += renderAdministrationItem(item);
      });

      html += `
          </ul>
        </section>
      `;
    });

    container.innerHTML = html;

  } catch (error) {
    console.error(error);
    container.innerHTML = "<p>Error loading administration content.</p>";
  }
}

document.addEventListener("DOMContentLoaded", loadAdministration);
</script>
